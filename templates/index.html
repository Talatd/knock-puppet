<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KNOCK — The Puppet's Door</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;0,800;1,400&amp;family=Inter:wght@400;700&amp;family=Special+Elite&amp;family=Courier+Prime:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        /* Custom Typewriter and Film Grain Effects */
        .typewriter-font { font-family: 'Courier Prime', monospace; }
        .serif-heavy { font-family: 'Newsreader', serif; }
        
        .film-grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            background: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.08;
        }

        .vignette {
            box-shadow: inset 0 0 150px 50px rgba(0,0,0,0.9);
        }

        .inner-border {
            box-shadow: inset 0 0 0 1px rgba(61, 43, 16, 0.4);
        }

        .ink-bleed {
            filter: blur(0.3px) contrast(1.2);
            text-shadow: 0.5px 0.5px 1px rgba(0,0,0,0.3);
        }

        @keyframes flicker {
            0% { opacity: 0.95; transform: scale(1.001); }
            5% { opacity: 0.85; }
            10% { opacity: 0.98; }
            15% { opacity: 0.9; }
            100% { opacity: 1; }
        }
        .projector-flicker {
            animation: flicker 0.2s infinite;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #100e0a; }
        ::-webkit-scrollbar-thumb { background: #3d2b10; }

        #loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            color: #d97706;
            font-family: 'Courier Prime', monospace;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        #vol-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        #vol-popup {
            display: none;
            position: absolute;
            top: 50%;
            right: 36px;
            transform: translateY(-50%);
            background: rgba(20,16,10,0.95);
            border: 1px solid rgba(120,80,20,0.4);
            padding: 8px 12px;
            align-items: center;
            gap: 8px;
            z-index: 99;
            white-space: nowrap;
        }
        #vol-popup.open {
            display: flex;
        }
        #vol-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 90px;
            height: 3px;
            background: #4a3520;
            outline: none;
            cursor: pointer;
        }
        #vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #d97706;
            cursor: pointer;
        }
        #vol-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #d97706;
            cursor: pointer;
            border: none;
        }

        #splash {
            position: fixed;
            inset: 0;
            background: rgba(10, 8, 5, 0.97);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 1.2s ease;
        }
        #splash.fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "surface-container-highest": "#38342f",
                "on-tertiary-fixed": "#081b3b",
                "on-surface-variant": "#d0c5b5",
                "surface-container-lowest": "#100e0a",
                "secondary": "#ecc165",
                "primary-fixed": "#ffdea4",
                "tertiary": "#b8c8f2",
                "tertiary-container": "#9dadd5",
                "on-secondary-container": "#ffd375",
                "on-tertiary-container": "#314163",
                "error-container": "#93000a",
                "surface-dim": "#16130f",
                "surface-tint": "#e4c285",
                "on-primary": "#412d00",
                "inverse-on-surface": "#33302b",
                "surface-container-high": "#2d2925",
                "secondary-container": "#795900",
                "surface-variant": "#38342f",
                "secondary-fixed-dim": "#ecc165",
                "on-error": "#690005",
                "primary-container": "#c9a96e",
                "on-secondary-fixed-variant": "#5c4300",
                "error": "#ffb4ab",
                "surface": "#16130f",
                "outline-variant": "#4d463a",
                "inverse-surface": "#e9e1da",
                "outline": "#998f81",
                "background": "#16130f",
                "on-primary-fixed-variant": "#5a4312",
                "on-tertiary-fixed-variant": "#374669",
                "on-background": "#e9e1da",
                "on-error-container": "#ffdad6",
                "primary": "#e6c487",
                "surface-container": "#221f1b",
                "tertiary-fixed": "#d8e2ff",
                "on-primary-container": "#543d0c",
                "surface-container-low": "#1e1b17",
                "on-surface": "#e9e1da",
                "on-tertiary": "#203051",
                "tertiary-fixed-dim": "#b6c6ef",
                "on-primary-fixed": "#261900",
                "secondary-fixed": "#ffdfa0",
                "primary-fixed-dim": "#e4c285",
                "inverse-primary": "#745a27",
                "on-secondary-fixed": "#261a00",
                "on-secondary": "#402d00",
                "surface-bright": "#3c3934"
            },
            "fontFamily": {
                "headline-md": ["Newsreader"],
                "label-sm": ["Inter"],
                "body-md": ["Inter"],
                "headline-xl": ["Newsreader"],
                "body-lg": ["Inter"]
            }
          },
        }
      }
    </script>
</head>
<body class="bg-background text-on-background selection:bg-primary/30 min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Minimal splash to satisfy browser autoplay policy -->
    <div id="splash" onclick="enterArchive()">
        <p class="text-amber-900/60 typewriter-font text-[10px] tracking-[0.6em] uppercase mb-6">Classified // Eyes Only</p>
        <h2 class="serif-heavy italic text-amber-700 text-4xl font-black tracking-widest mb-8">KNOCK</h2>
        <span class="typewriter-font text-amber-600/70 text-xs tracking-[0.4em] uppercase border border-amber-900/40 px-8 py-3 hover:bg-amber-900/10 transition-all">
            Enter the Archive
        </span>
        <p class="mt-10 text-stone-800 text-[9px] font-mono tracking-widest">"Mama, take this badge off of me..."</p>
    </div>

    <!-- Hidden YouTube player -->
    <audio id="bg-music" loop style="display:none;">
        <source src="/static/audio/background.mp3" type="audio/mpeg">
    </audio>
    <div class="film-grain"></div>
    <audio id="puppet-audio" style="display:none;"></audio>

    <!-- Header Section -->
    <header class="z-10 bg-stone-950/95 flex flex-col items-center justify-center w-full px-12 py-10 space-y-4 border-b border-amber-900/40 shadow-[0_4px_30px_rgba(0,0,0,0.9)]">
        <div class="flex items-center justify-between w-full max-w-7xl">
            <div class="flex flex-col items-start">
                <h1 class="text-5xl font-black tracking-[0.3em] text-amber-600 uppercase italic projector-flicker serif-heavy">KNOCK</h1>
                <p class="text-amber-100/70 typewriter-font text-xs italic tracking-tighter mt-1">Mama, take this badge off of me...</p>
            </div>
            <div class="flex items-center space-x-6 text-stone-600">
                <div id="vol-wrapper">
                    <div id="vol-popup">
                        <span class="text-stone-600 typewriter-font text-[9px] uppercase tracking-widest">vol</span>
                        <input id="vol-slider" type="range" min="0" max="1" step="0.01" value="0.07" oninput="setBgVolume(this.value)">
                    </div>
                    <span id="vol-icon" onclick="toggleVolPopup()" class="material-symbols-outlined hover:text-amber-400 transition-all cursor-pointer active:scale-95">volume_up</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Canvas -->
    <main class="flex-grow flex flex-col items-center py-12 px-gutter space-y-12 max-w-5xl mx-auto w-full relative z-0">
        <!-- Puppet Image Area -->
        <section class="w-full flex flex-col items-center">
            <div class="relative w-full max-w-md aspect-square bg-surface-container-lowest border border-outline-variant/30 p-2 overflow-hidden shadow-2xl">
                <!-- Image Wrapper with vignette overlay -->
                <div class="relative w-full h-full">
                    <img id="puppet-img" class="w-full h-full object-cover sepia-[0.3] contrast-[1.1] brightness-[0.9]" src="https://image.pollinations.ai/prompt/A%20weathered,%20hand-carved%20wooden%20marionette%20puppet%20of%20a%201970s%20Vietnam%20soldier,%20wearing%20a%20tattered%20olive-drab%20uniform,%20a%20faded%20headband,%20visible%20wood%20grain%20texture,%20vintage%20doll%20joints.,%20hanging%20loosely%20from%20tangled%20strings,%20head%20bowed,%20exhausted%20expression,%20watercolor%20and%20charcoal%20sketch%20style,%20moody%20cinematic%20lighting,%20dark%20vignetted%20background,%204k,%20artistic,%20no%20text?width=1024&height=1024&nologo=true&seed=12345"/>
                    <div class="absolute inset-0 vignette pointer-events-none"></div>
                </div>
                <!-- "Tape" accents for tactile feel -->
                <div class="absolute -top-1 -left-1 w-8 h-8 bg-stone-800/20 rotate-45 border-t border-l border-stone-700/30"></div>
                <div class="absolute -bottom-1 -right-1 w-8 h-8 bg-stone-800/20 rotate-45 border-b border-r border-stone-700/30"></div>
            </div>
            <div class="mt-4 flex flex-col items-center space-y-1">
                <span class="bg-amber-900/40 text-amber-500 px-6 py-2 text-sm uppercase font-bold tracking-[0.3em] typewriter-font rounded-none border border-amber-600/30 shadow-[0_0_15px_rgba(217,119,6,0.2)]">
                    MOOD: <span id="current-mood">weary</span>
                </span>
            </div>
        </section>

        <!-- Chat Area -->
        <section class="w-full max-w-3xl flex flex-col">
            <div class="relative">
                <div id="chat-box" class="bg-surface-container-lowest border border-outline-variant/20 h-[450px] overflow-y-auto p-6 space-y-8 inner-border relative">
                    <!-- Background texture layer -->
                    <div class="absolute inset-0 opacity-5 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/paper-fibers.png')]"></div>
                    <div id="loading">The spirit is writing...</div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="mt-6 w-full flex flex-col space-y-4">
                <div class="relative">
                    <input id="user-input" class="w-full bg-transparent border-none border-b border-outline-variant/50 text-on-surface focus:ring-0 focus:border-primary py-4 px-2 typewriter-font placeholder:text-stone-700 placeholder:italic transition-all uppercase tracking-wider" placeholder="Speak to the puppet..." type="text" onkeypress="if(event.key==='Enter') sendMessage()"/>
                    <div class="absolute right-0 bottom-4 flex items-center space-x-4 pr-2">
                        <span class="material-symbols-outlined text-stone-600 cursor-pointer hover:text-amber-500 transition-colors">mic</span>
                    </div>
                </div>
                <div class="flex justify-between items-center pt-2">
                    <div class="flex space-x-4">
                        <button onclick="sendMessage()" class="px-8 py-2 bg-stone-900 border border-amber-900/40 text-amber-100 uppercase text-xs font-bold tracking-widest hover:bg-amber-900/30 hover:border-amber-600 transition-all duration-300 shadow-sm active:scale-95 typewriter-font">
                            Transmit
                        </button>
                        <button onclick="resetChat()" class="px-8 py-2 bg-transparent border border-stone-800 text-stone-600 uppercase text-xs font-bold tracking-widest hover:text-stone-400 hover:border-stone-600 transition-all duration-300 active:scale-95 typewriter-font">
                            Redact
                        </button>
                    </div>
                    <button class="flex items-center space-x-2 text-stone-700 hover:text-amber-500 transition-colors group">
                        <span class="text-[10px] font-bold typewriter-font uppercase opacity-0 group-hover:opacity-100 transition-opacity">Toggle Comms</span>
                        <span class="material-symbols-outlined text-xl">volume_up</span>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="z-10 bg-stone-950 flex justify-between items-center px-10 py-6 w-full border-t border-stone-900">
        <div class="flex flex-col">
            <span class="text-stone-600 font-bold font-mono text-[10px] tracking-widest uppercase ink-bleed">DEPARTMENT OF RECORDS // 1973 // EYES ONLY</span>
            <span class="text-stone-800 text-[8px] font-mono tracking-tighter">CLASSIFICATION: TOP SECRET // ORCON</span>
        </div>
    </footer>

    <script>
        function enterArchive() {
            const splash = document.getElementById('splash');
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 1300);

            // Start background music
            const bgMusic = document.getElementById('bg-music');
            bgMusic.volume = 0.07;
            bgMusic.play().catch(e => console.log('Audio play failed:', e));

            // Load the initial chat
            resetChat();
        }

        let bgMuted = false;
        let volPopupOpen = false;

        function toggleVolPopup() {
            const popup = document.getElementById('vol-popup');
            volPopupOpen = !volPopupOpen;
            popup.classList.toggle('open', volPopupOpen);
        }

        // Close popup when clicking outside
        document.addEventListener('click', function(e) {
            const wrapper = document.getElementById('vol-wrapper');
            if (wrapper && !wrapper.contains(e.target)) {
                document.getElementById('vol-popup').classList.remove('open');
                volPopupOpen = false;
            }
        });

        function setBgVolume(val) {
            const bgMusic = document.getElementById('bg-music');
            const icon = document.getElementById('vol-icon');
            bgMusic.muted = false;
            bgMusic.volume = parseFloat(val);
            bgMuted = false;
            if (parseFloat(val) === 0) {
                icon.textContent = 'volume_off';
            } else if (parseFloat(val) < 0.4) {
                icon.textContent = 'volume_down';
            } else {
                icon.textContent = 'volume_up';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            const chatBox = document.getElementById('chat-box');
            const loading = document.getElementById('loading');

            const userMsgHtml = `
                <div class="flex flex-col items-end max-w-[85%] ml-auto">
                    <div class="flex items-center space-x-2 mb-1 justify-end">
                        <span class="typewriter-font text-[10px] uppercase font-bold text-stone-500">Field Operative</span>
                        <span class="material-symbols-outlined text-stone-500 text-sm">person</span>
                    </div>
                    <div class="bg-stone-900/40 border-r border-stone-700/50 p-4">
                        <p class="text-on-surface-variant typewriter-font text-body-md">${message}</p>
                    </div>
                </div>
            `;
            
            chatBox.insertAdjacentHTML('beforeend', userMsgHtml);
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            loading.style.display = 'block';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();
                
                const puppetMsgHtml = `
                    <div class="flex flex-col items-start max-w-[85%]">
                        <div class="flex items-center space-x-2 mb-1">
                            <span class="material-symbols-outlined text-amber-500 text-sm">article</span>
                            <span class="typewriter-font text-[10px] uppercase font-bold text-amber-600/80">The Puppet</span>
                        </div>
                        <div class="bg-amber-900/10 border-l border-amber-600/40 p-4 ink-bleed">
                            <p class="text-primary italic font-headline-md text-body-lg leading-relaxed">"${data.response}"</p>
                        </div>
                    </div>
                `;

                chatBox.insertAdjacentHTML('beforeend', puppetMsgHtml);
                document.getElementById('current-mood').textContent = data.mood;

                if (data.image) {
                    let img = document.getElementById('puppet-img');
                    img.src = '/tmp/' + data.image + '?t=' + Date.now();
                }

                if (data.audio) {
                    let audio = document.getElementById('puppet-audio');
                    audio.src = '/tmp/' + data.audio;
                    audio.play();
                }
            } catch (err) {
                chatBox.insertAdjacentHTML('beforeend', `<div class="text-red-500 typewriter-font text-xs p-4">SYSTEM ERROR: CONNECTION LOST...</div>`);
            } finally {
                loading.style.display = 'none';
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        async function resetChat() {
            const chatBox = document.getElementById('chat-box');
            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            try {
                const res = await fetch('/reset', { method: 'POST' });
                const data = await res.json();
                
                const texture = chatBox.querySelector('div:first-child');
                const loader = document.getElementById('loading');
                chatBox.innerHTML = '';
                if (texture) chatBox.appendChild(texture);
                if (loader) chatBox.appendChild(loader);

                document.getElementById('current-mood').textContent = 'weary';
                if (data.image) {
                    let img = document.getElementById('puppet-img');
                    img.src = '/tmp/' + data.image + '?t=' + Date.now();
                }
            } catch (e) {
                console.error("Reset failed", e);
            } finally {
                loading.style.display = 'none';
            }
        }


    </script>
</body>
</html>
